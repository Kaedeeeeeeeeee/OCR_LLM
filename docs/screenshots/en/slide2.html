<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1280">
    <title>Cheese! OCR — Instant Capture</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            width: 1280px;
            height: 800px;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Helvetica Neue", Arial, sans-serif;
            background: #f5f5f7;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            -webkit-font-smoothing: antialiased;
        }
        h1 {
            font-size: 3.2rem;
            font-weight: 800;
            letter-spacing: -0.03em;
            color: #1d1d1f;
            margin-bottom: 0.4rem;
        }
        .subtitle {
            font-size: 1.25rem;
            color: #6e6e73;
            margin-bottom: 1.25rem;
        }
        .screen {
            width: 720px;
            height: 260px;
            background: #ffffff;
            border-radius: 12px;
            box-shadow: 0 8px 40px rgba(0,0,0,0.1);
            position: relative;
            overflow: hidden;
        }
        .titlebar {
            height: 32px;
            background: #e8e8ed;
            display: flex;
            align-items: center;
            padding: 0 14px;
            gap: 8px;
        }
        .dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
        }
        .dot.red { background: #ff5f57; }
        .dot.yellow { background: #febc2e; }
        .dot.green { background: #28c840; }
        .content {
            padding: 24px 28px;
            position: relative;
        }
        .line {
            height: 12px;
            border-radius: 4px;
            background: #e0e0e5;
            margin-bottom: 10px;
        }
        .line:nth-child(1) { width: 65%; }
        .line:nth-child(2) { width: 80%; }
        .line:nth-child(3) { width: 50%; }
        .line:nth-child(4) { width: 72%; }
        .line:nth-child(5) { width: 90%; }
        .line:nth-child(6) { width: 58%; }
        .line:nth-child(7) { width: 75%; }
        .line:nth-child(8) { width: 40%; }
        .line:nth-child(9) { width: 85%; }
        .line:nth-child(10) { width: 60%; }
        .line:nth-child(11) { width: 70%; }
        .line:nth-child(12) { width: 45%; }
        /* Selection rectangle */
        .selection {
            position: absolute;
            top: 58px;
            left: 100px;
            width: 420px;
            height: 140px;
            border: 2.5px solid #7EC8E3;
            background: rgba(126, 200, 227, 0.08);
            border-radius: 2px;
        }
        .selection::before,
        .selection::after {
            content: '';
            position: absolute;
            width: 8px;
            height: 8px;
            background: #7EC8E3;
            border-radius: 1px;
        }
        .selection::before { top: -4px; left: -4px; }
        .selection::after { bottom: -4px; right: -4px; }
        .handle-tr, .handle-bl {
            position: absolute;
            width: 8px;
            height: 8px;
            background: #7EC8E3;
            border-radius: 1px;
        }
        .handle-tr { top: -4px; right: -4px; }
        .handle-bl { bottom: -4px; left: -4px; }
        .cursor {
            position: absolute;
            bottom: -20px;
            right: -14px;
        }
        .cursor svg {
            width: 28px;
            height: 28px;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.25));
        }
        .selected-text {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            padding: 12px 14px;
            display: flex;
            flex-direction: column;
            gap: 9px;
        }
        .sel-line {
            height: 12px;
            border-radius: 4px;
            background: rgba(126, 200, 227, 0.25);
        }
        .sel-line:nth-child(1) { width: 92%; }
        .sel-line:nth-child(2) { width: 78%; }
        .sel-line:nth-child(3) { width: 88%; }
        .sel-line:nth-child(4) { width: 65%; }
        .sel-line:nth-child(5) { width: 82%; }

        /* Arrow connecting screen to HUD */
        .arrow {
            margin: 14px 0 14px;
            color: #7EC8E3;
            position: relative;
            z-index: 10;
        }

        /* HUD toast — scaled 2x for visibility */
        .hud-wrapper {
            transform: scale(2);
            transform-origin: center top;
            margin-top: 6px;
        }
        .hud {
            display: inline-flex;
            align-items: center;
            gap: 18px;
            padding: 16px 24px;
            background: rgba(0, 0, 0, 0.85);
            border-radius: 9999px;
            box-shadow: 0 5px 12px rgba(0, 0, 0, 0.3);
            position: relative;
        }
        .hud::after {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 9999px;
            border: 0.5px solid rgba(255, 255, 255, 0.15);
            pointer-events: none;
        }
        .mascot {
            width: 20px;
            height: 24px;
            flex-shrink: 0;
        }
        .hud-text {
            font-size: 14px;
            font-weight: 500;
            color: #ffffff;
            white-space: nowrap;
        }
    </style>
</head>
<body>
    <h1>Instant Screen Capture</h1>
    <p class="subtitle">Select any area. Get text instantly.</p>
    <div class="screen">
        <div class="titlebar">
            <div class="dot red"></div>
            <div class="dot yellow"></div>
            <div class="dot green"></div>
        </div>
        <div class="content">
            <div class="line"></div>
            <div class="line"></div>
            <div class="line"></div>
            <div class="line"></div>
            <div class="line"></div>
            <div class="line"></div>
            <div class="line"></div>
            <div class="line"></div>
            <div class="line"></div>
            <div class="line"></div>
            <div class="line"></div>
            <div class="line"></div>
            <div class="selection">
                <div class="handle-tr"></div>
                <div class="handle-bl"></div>
                <div class="selected-text">
                    <div class="sel-line"></div>
                    <div class="sel-line"></div>
                    <div class="sel-line"></div>
                    <div class="sel-line"></div>
                    <div class="sel-line"></div>
                </div>
                <div class="cursor">
                    <svg viewBox="0 0 24 24" fill="white" stroke="black" stroke-width="1">
                        <path d="M5 3l14 8-6.5 1.5L11 19z"/>
                    </svg>
                </div>
            </div>
        </div>
    </div>

    <!-- Arrow -->
    <div class="arrow">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="12" y1="5" x2="12" y2="19"/>
            <polyline points="19 12 12 19 5 12"/>
        </svg>
    </div>

    <!-- HUD toast -->
    <div class="hud-wrapper">
        <div class="hud">
            <div class="mascot">
                <svg viewBox="0 0 26 28" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M3 2C1.89543 2 1 2.89543 1 4V24C1 25.1046 1.89543 26 3 26H23C24.1046 26 25 25.1046 25 24V8L20 2H3Z"
                          stroke="#4ade80" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
                    <path d="M20 2V8H25" stroke="#4ade80" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
                    <circle cx="8" cy="14" r="1.5" fill="#4ade80"/>
                    <circle cx="18" cy="14" r="1.5" fill="#4ade80"/>
                    <path d="M10 19.5C10 19.5 11 21 13 21C15 21 16 19.5 16 19.5"
                          stroke="#4ade80" stroke-width="2.5" stroke-linecap="round" fill="none"/>
                </svg>
            </div>
            <span class="hud-text">Hello, World! 你好世界</span>
        </div>
    </div>
</body>
</html>
