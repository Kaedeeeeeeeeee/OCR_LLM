<!DOCTYPE html>
<html lang="zh-Hans">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1280">
    <title>Cheese! OCR — Multi-language</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            width: 1280px;
            height: 800px;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Helvetica Neue", Arial, sans-serif;
            background: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            -webkit-font-smoothing: antialiased;
        }
        h1 {
            font-size: 3.5rem;
            font-weight: 800;
            letter-spacing: -0.03em;
            color: #1d1d1f;
            margin-bottom: 0.5rem;
        }
        .subtitle {
            font-size: 1.35rem;
            color: #6e6e73;
            margin-bottom: 3.5rem;
        }
        .lang-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
            width: 860px;
        }
        .lang-card {
            background: #f5f5f7;
            border-radius: 20px;
            padding: 2rem 2.5rem;
            position: relative;
            overflow: hidden;
        }
        .lang-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 5px;
            height: 100%;
        }
        .lang-card.en::before { background: #7EC8E3; }
        .lang-card.cn::before { background: #FF6B6B; }
        .lang-card.jp::before { background: #FFD93D; }
        .lang-card.kr::before { background: #6BCB77; }
        .lang-label {
            font-size: 0.8rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            margin-bottom: 0.75rem;
        }
        .lang-card.en .lang-label { color: #7EC8E3; }
        .lang-card.cn .lang-label { color: #FF6B6B; }
        .lang-card.jp .lang-label { color: #d4a900; }
        .lang-card.kr .lang-label { color: #6BCB77; }
        .lang-text {
            font-size: 1.5rem;
            font-weight: 500;
            color: #1d1d1f;
            line-height: 1.5;
        }
    </style>
</head>
<body>
    <h1>多语言 OCR</h1>
    <p class="subtitle">开箱即用，识别多种语言文字</p>
    <div class="lang-grid">
        <div class="lang-card en">
            <div class="lang-label">English</div>
            <div class="lang-text">The quick brown fox jumps over the lazy dog.</div>
        </div>
        <div class="lang-card cn">
            <div class="lang-label">中文</div>
            <div class="lang-text">天下武功，唯快不破。一键识别，妙不可言。</div>
        </div>
        <div class="lang-card jp">
            <div class="lang-label">日本語</div>
            <div class="lang-text">花が咲く春の日、文字を読み取る喜び。</div>
        </div>
        <div class="lang-card kr">
            <div class="lang-label">한국어</div>
            <div class="lang-text">빠르고 정확한 문자 인식, 클릭 한 번이면 충분합니다.</div>
        </div>
    </div>
</body>
</html>
