<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1280">
    <title>Cheese! OCR — Menu Bar App</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            width: 1280px;
            height: 800px;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Helvetica Neue", Arial, sans-serif;
            background: #f0f0f5;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            -webkit-font-smoothing: antialiased;
        }
        h1 {
            font-size: 3.5rem;
            font-weight: 800;
            letter-spacing: -0.03em;
            color: #1d1d1f;
            margin-bottom: 0.5rem;
        }
        .subtitle {
            font-size: 1.35rem;
            color: #6e6e73;
            margin-bottom: 3.5rem;
        }

        /* ── Menu bar scene container ── */
        .menubar-scene {
            position: relative;
        }

        /* ── macOS Menu Bar ── */
        .menubar {
            width: 760px;
            height: 25px;
            background: rgba(243, 243, 243, 0.85);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border-radius: 6px 6px 0 0;
            display: flex;
            align-items: center;
            padding: 0 10px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.06);
        }
        .menubar-left {
            display: flex;
            align-items: center;
            gap: 14px;
        }
        .apple-logo {
            width: 11px;
            height: 13px;
            opacity: 0.85;
        }
        .menubar-app-name {
            font-size: 13px;
            font-weight: 600;
            color: #1d1d1f;
            letter-spacing: -0.01em;
        }
        .menubar-menu-label {
            font-size: 13px;
            font-weight: 400;
            color: #1d1d1f;
            opacity: 0.85;
        }
        .menubar-right {
            margin-left: auto;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .menubar-icon {
            display: flex;
            align-items: center;
            justify-content: center;
            color: #1d1d1f;
        }
        .menubar-icon svg {
            width: 14px;
            height: 14px;
        }
        .menubar-clock {
            font-size: 13px;
            font-weight: 500;
            color: #1d1d1f;
            letter-spacing: -0.01em;
            white-space: nowrap;
        }
        /* Tray icon selected state */
        .tray-icon-wrapper {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 24px;
            height: 18px;
            background: rgba(0, 0, 0, 0.1);
            border-radius: 3px;
        }
        .tray-icon-wrapper svg {
            width: 15px;
            height: 15px;
        }

        /* ── Dropdown (NSMenu style) ── */
        .dropdown {
            position: absolute;
            top: 27px;
            right: 6px;
            width: 240px;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(40px);
            -webkit-backdrop-filter: blur(40px);
            border-radius: 8px;
            box-shadow: 0 10px 38px rgba(0,0,0,0.12), 0 4px 12px rgba(0,0,0,0.08);
            border: 0.5px solid rgba(0,0,0,0.12);
            padding: 5px;
        }
        .menu-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 4px 10px;
            height: 22px;
            border-radius: 5px;
            font-size: 13px;
            font-weight: 400;
            color: #1d1d1f;
            cursor: default;
            line-height: 1;
        }
        .menu-item.highlight {
            background: #0062E0;
            color: #fff;
        }
        .menu-item .shortcut {
            margin-left: auto;
            font-size: 12px;
            opacity: 0.5;
            letter-spacing: 0.02em;
        }
        .menu-item.highlight .shortcut {
            opacity: 0.7;
        }
        .menu-item-icon {
            width: 16px;
            height: 16px;
            flex-shrink: 0;
        }
        .menu-item.highlight .menu-item-icon {
            color: #fff;
        }
        .divider {
            height: 1px;
            background: rgba(0,0,0,0.08);
            margin: 4px 10px;
        }
    </style>
</head>
<body>
    <h1>メニューバーに常駐</h1>
    <p class="subtitle">いつでも準備OK、邪魔にならない</p>

    <div class="menubar-scene">
        <!-- macOS Menu Bar -->
        <div class="menubar">
            <div class="menubar-left">
                <!-- Apple logo -->
                <svg class="apple-logo" viewBox="0 0 17 21" fill="#1d1d1f">
                    <path d="M14.94 16.24c-.37.82-.54 1.19-.99 1.91-.63.99-1.53 2.23-2.64 2.24-1.1.01-1.38-.72-2.88-.71-1.49.01-1.8.72-2.9.71-1.11-.01-1.96-1.13-2.59-2.12C1.14 15.38.82 12.07 2.15 10.29c.95-1.27 2.4-2.01 3.73-2.01 1.39 0 2.26.72 3.41.72 1.11 0 1.79-.72 3.38-.72 1.19 0 2.47.65 3.42 1.77-3.01 1.65-2.52 5.95.85 7.19zM11.38 6.42C11.88 5.8 12.25 4.91 12.13 4c-.83.05-1.81.56-2.38 1.22-.52.6-.95 1.5-.78 2.37.91.03 1.85-.49 2.41-1.17z"/>
                </svg>
                <span class="menubar-app-name">Finder</span>
                <span class="menubar-menu-label">ファイル</span>
                <span class="menubar-menu-label">編集</span>
                <span class="menubar-menu-label">表示</span>
                <span class="menubar-menu-label">移動</span>
                <span class="menubar-menu-label">ウインドウ</span>
                <span class="menubar-menu-label">ヘルプ</span>
            </div>
            <div class="menubar-right">
                <!-- Clock -->
                <span class="menubar-clock">Fri 10:30 AM</span>
                <!-- Battery -->
                <div class="menubar-icon">
                    <svg viewBox="0 0 25 12" fill="none">
                        <rect x="0.5" y="0.5" width="21" height="11" rx="2.5" stroke="#1d1d1f" stroke-width="1"/>
                        <path d="M23 4v4a2 2 0 0 0 0-4z" fill="#1d1d1f" opacity="0.4"/>
                        <rect x="2" y="2" width="16" height="8" rx="1.5" fill="#1d1d1f" opacity="0.85"/>
                    </svg>
                </div>
                <!-- Wi-Fi -->
                <div class="menubar-icon">
                    <svg viewBox="0 0 16 14" fill="none">
                        <circle cx="8" cy="12" r="1.2" fill="#1d1d1f" opacity="0.9"/>
                        <path d="M5.5 9.8a3.6 3.6 0 0 1 5 0" stroke="#1d1d1f" stroke-width="1.3" stroke-linecap="round" opacity="0.85"/>
                        <path d="M3.2 7.2a6.8 6.8 0 0 1 9.6 0" stroke="#1d1d1f" stroke-width="1.3" stroke-linecap="round" opacity="0.75"/>
                        <path d="M1 4.6a10 10 0 0 1 14 0" stroke="#1d1d1f" stroke-width="1.3" stroke-linecap="round" opacity="0.65"/>
                    </svg>
                </div>
                <!-- Cheese OCR tray icon (selected) -->
                <div class="tray-icon-wrapper">
                    <svg viewBox="0 0 24 24" fill="none" stroke="#1d1d1f" stroke-width="2" stroke-linejoin="round">
                        <path d="M6 3C4.89543 3 4 3.89543 4 5V19C4 20.1046 4.89543 21 6 21H18C19.1046 21 20 20.1046 20 19V7L16 3H6Z"/>
                        <path d="M16 3V7H20" stroke-linecap="round"/>
                        <circle cx="9" cy="13" r="1.5" fill="#1d1d1f" stroke="none"/>
                        <circle cx="15" cy="13" r="1.5" fill="#1d1d1f" stroke="none"/>
                        <path d="M10 16.5C10 16.5 10.8 17.5 12 17.5C13.2 17.5 14 16.5 14 16.5" stroke-linecap="round" stroke-width="1.5"/>
                    </svg>
                </div>
            </div>
        </div>

        <!-- Dropdown menu (NSMenu style) -->
        <div class="dropdown">
            <div class="menu-item highlight">
                <svg class="menu-item-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="2" y="1" width="12" height="14" rx="1.5"/>
                    <path d="M5 5.5h6M5 8h6M5 10.5h3"/>
                </svg>
                キャプチャしてOCR
                <span class="shortcut">⌘⇧E</span>
            </div>
            <div class="divider"></div>
            <div class="menu-item">
                Hello World こんにち...
            </div>
            <div class="menu-item">
                花が咲く春の日文字...
            </div>
            <div class="menu-item">
                import SwiftUI fra...
            </div>
            <div class="divider"></div>
            <div class="menu-item">
                もっと見る
            </div>
            <div class="divider"></div>
            <div class="menu-item">
                設定
                <span class="shortcut">⌘,</span>
            </div>
            <div class="menu-item">
                終了
                <span class="shortcut">⌘Q</span>
            </div>
        </div>
    </div>
</body>
</html>
